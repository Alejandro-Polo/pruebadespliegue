version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: symfony-mysql
    restart: always
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: symfony-backend
    depends_on:
      - database
    environment:
      DATABASE_URL: "mysql://symfony:symfony@database:3306/app_db"
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: react-frontend
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  db_data: